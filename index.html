<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auralabs Research — We Are Open!</title>
  <link rel="icon" type="image/png" href="Assets/Favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Nevan RUS';
      src: url('Assets/Nevan RUS.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      color: #fff;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .hero {
      position: relative;
      flex: 1;
      width: 100%;
      min-height: 100vh;
      background: url('Assets/Background.jpeg') no-repeat center center / cover;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.40);
      z-index: 1;
    }

    /* ── Floating Helices ── */
    .helix-float {
      position: absolute;
      z-index: 2;
      pointer-events: none;
      opacity: 0.55;
      animation: floatPulse var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    @keyframes floatPulse {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.15); }
    }

    /* ── Entrance Animations ── */
    .anim-fade-up {
      opacity: 0;
      transform: translateY(40px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .anim-fade-up-d1 { animation-delay: 0.15s; }
    .anim-fade-up-d2 { animation-delay: 0.35s; }
    .anim-fade-up-d3 { animation-delay: 0.55s; }
    .anim-fade-up-d4 { animation-delay: 0.75s; }
    .anim-fade-up-d5 { animation-delay: 0.95s; }
    .anim-fade-up-d6 { animation-delay: 1.15s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .anim-scale-in {
      opacity: 0;
      transform: scale(0.7);
      animation: scaleIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.2s forwards;
    }

    @keyframes scaleIn {
      to { opacity: 1; transform: scale(1); }
    }

    /* ── Content ── */
    .content {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 860px;
      width: 92%;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      background: rgba(0,0,0,0.15);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .bordered {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 0.75rem 1rem;
    }

    .logo {
      max-width: 200px;
      width: 100%;
      height: auto;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
      transition: filter 0.4s ease;
    }

    .logo:hover {
      filter: drop-shadow(0 4px 35px rgba(255,255,255,0.25)) brightness(1.08);
    }

    .heading-gradient {
      font-family: 'Nevan RUS', serif;
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.35), 0 0 60px rgba(255, 215, 0, 0.15);
      animation: goldPulse 3s ease-in-out infinite;
    }

    @keyframes goldPulse {
      0%, 100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.35), 0 0 60px rgba(255, 215, 0, 0.15); }
      50% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 80px rgba(255, 215, 0, 0.3); }
    }

    h1 {
      font-family: 'Nevan RUS', serif;
      font-size: clamp(2.5rem, 9vw, 4.8rem);
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      text-shadow: 0 2px 30px rgba(0,0,0,0.35);
    }

    .sub {
      font-size: clamp(0.9rem, 2.2vw, 1.1rem);
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.85;
      position: relative;
      display: inline-block;
    }

    .sub::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 2px;
      background: rgba(255,255,255,0.5);
      animation: underlineIn 0.6s ease-out 1.4s forwards;
    }

    @keyframes underlineIn {
      to { width: 100%; }
    }

    .tagline {
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      opacity: 0.7;
      margin-top: 0.25rem;
    }

    hr.divider {
      width: 60px;
      height: 2px;
      background: rgba(255,255,255,0.3);
      border: none;
      margin: 1.5rem auto;
      transition: width 0.4s ease;
    }

    .content:hover hr.divider {
      width: 100px;
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem 2rem;
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      font-weight: 400;
    }

    .contact a {
      color: #fff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      transition: opacity 0.25s, transform 0.25s;
      position: relative;
    }

    .contact a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.35s ease;
    }

    .contact a:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    .contact a:hover {
      opacity: 0.8;
      transform: translateY(-2px);
    }

    .contact svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
      transition: transform 0.3s;
    }

    .contact a:hover svg {
      transform: scale(1.2);
    }

    /* ── Social ── */
    .social {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem 2.5rem;
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      font-weight: 400;
    }

    .social a {
      color: #fff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      transition: opacity 0.25s, transform 0.25s;
      position: relative;
    }

    .social a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.35s ease;
    }

    .social a:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    .social a:hover {
      opacity: 0.8;
      transform: translateY(-2px);
    }

    .social svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      flex-shrink: 0;
      transition: transform 0.3s;
    }

    .social a:hover svg {
      transform: scale(1.2);
    }

    /* ── QR Row ── */
    .qr-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
    }

    .barcode-wrap {
      position: relative;
      display: inline-block;
    }

    .barcode {
      max-width: 130px;
      width: 100%;
      height: auto;
      opacity: 0.9;
      transition: opacity 0.3s, transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      cursor: pointer;
    }

    .barcode:hover {
      opacity: 1;
      transform: scale(1.08);
    }

    .barcode-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.35rem;
      opacity: 0.6;
      transition: opacity 0.3s, letter-spacing 0.3s;
    }

    .barcode-wrap:hover .barcode-label {
      opacity: 1;
      letter-spacing: 0.25em;
    }

    /* ── Mascot ── */
    .mascot {
      position: fixed;
      bottom: 0;
      right: 0;
      z-index: 4;
      width: clamp(100px, 18vw, 260px);
      height: auto;
      pointer-events: none;
    }

    /* ── Footer ── */
    .site-footer {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: clamp(0.8rem, 1.6vw, 0.95rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.55;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 2rem;
    }

    @media (max-width: 640px) {
      .content { padding: 1.5rem 1rem; width: 95%; }
      .logo { max-width: 140px; margin-bottom: 1rem; }
      .contact { flex-direction: column; align-items: center; gap: 0.5rem; }
      .social { flex-direction: column; align-items: center; gap: 0.5rem; }
      .qr-row { flex-direction: column; align-items: center; gap: 1.2rem; }
      .mascot { width: 80px; bottom: 0; right: 0; }
      .site-footer { padding: 1rem 0.5rem; }
      .bordered { padding: 0.5rem 0.6rem; }
    }
  </style>
</head>

  <script>
    (function placeHelices() {
      const hero = document.getElementById('hero');
      if (!hero) return;

      const specs = [
        { src: 'Assets/helix.png',  side: 'left',  top: 15, edge: 5,  size: 55, dur: 5.5, delay: 0 },
        { src: 'Assets/3helix.png', side: 'right', top: 65, edge: 6,  size: 70, dur: 6.5, delay: 1.2 },
      ];

      specs.forEach(s => {
        const img = document.createElement('img');
        img.src = s.src;
        img.className = 'helix-float';
        img.alt = '';
        img.style.width = s.size + 'px';
        img.style.height = 'auto';
        img.style.top = s.top + '%';
        img.style[s.side] = s.edge + '%';
        img.style.setProperty('--dur', s.dur + 's');
        img.style.setProperty('--delay', s.delay + 's');
        hero.appendChild(img);
      });
    })();
  </script>
