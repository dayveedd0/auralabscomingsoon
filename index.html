<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auralabs Research — Coming Soon</title>
  <link rel="icon" type="image/png" href="Assets/Favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Nevan RUS';
      src: url('Assets/Nevan RUS.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      color: #fff;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background: url('Assets/Background.jpeg') no-repeat center center / cover;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    /* ── Floating Helices ── */
    .helix-float {
      position: absolute;
      z-index: 2;
      pointer-events: none;
      opacity: 0.55;
      animation: floatPulse var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    @keyframes floatPulse {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-30px) scale(1.15);
      }
    }

    /* ── Entrance Animations ── */
    .anim-fade-up {
      opacity: 0;
      transform: translateY(40px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .anim-fade-up-d1 { animation-delay: 0.15s; }
    .anim-fade-up-d2 { animation-delay: 0.35s; }
    .anim-fade-up-d3 { animation-delay: 0.55s; }
    .anim-fade-up-d4 { animation-delay: 0.75s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .anim-scale-in {
      opacity: 0;
      transform: scale(0.7);
      animation: scaleIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.95s forwards;
    }

    @keyframes scaleIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .content {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 2rem;
      max-width: 780px;
      width: 100%;
    }

    .logo {
      max-width: 220px;
      width: 100%;
      height: auto;
      margin-bottom: 2.5rem;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
    }

    .logo:hover {
      filter: drop-shadow(0 4px 35px rgba(255,255,255,0.25)) brightness(1.08);
    }

    h1 {
      font-family: 'Nevan RUS', serif;
      font-size: clamp(2.8rem, 10vw, 5.5rem);
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
      text-transform: uppercase;
      text-shadow: 0 2px 30px rgba(0,0,0,0.35);
    }

    .sub {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 3rem;
      opacity: 0.85;
      position: relative;
      display: inline-block;
      padding: 0 0.5rem;
    }

    .sub::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 2px;
      background: rgba(255,255,255,0.5);
      animation: underlineIn 0.6s ease-out 1.4s forwards;
    }

    @keyframes underlineIn {
      to { width: 100%; }
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem 2.5rem;
      margin-bottom: 3rem;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-weight: 400;
    }

    .contact a {
      color: #fff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: opacity 0.25s, transform 0.25s;
      position: relative;
    }

    .contact a::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 100%;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.35s ease;
    }

    .contact a:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    .contact a:hover {
      opacity: 0.8;
      transform: translateY(-2px);
    }

    .contact svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
      transition: transform 0.3s;
    }

    .contact a:hover svg {
      transform: scale(1.2);
    }

    /* ── Mascot ── */
    .mascot {
      position: fixed;
      bottom: 0;
      right: 0;
      z-index: 4;
      width: clamp(100px, 18vw, 260px);
      height: auto;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      .mascot {
        width: 80px;
        bottom: 0;
        right: 0;
      }
    }

    .barcode-wrap {
      position: relative;
      display: inline-block;
    }

    .barcode {
      max-width: 160px;
      width: 100%;
      height: auto;
      opacity: 0.9;
      transition: opacity 0.3s, transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      cursor: pointer;
    }

    .barcode:hover {
      opacity: 1;
      transform: scale(1.08);
    }

    .barcode-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.4rem;
      opacity: 0.6;
      transition: opacity 0.3s, letter-spacing 0.3s;
    }

    .barcode-wrap:hover .barcode-label {
      opacity: 1;
      letter-spacing: 0.25em;
    }

    hr.divider {
      width: 60px;
      height: 2px;
      background: rgba(255,255,255,0.4);
      border: none;
      margin: 0 auto 2.5rem;
      transition: width 0.4s ease;
    }

    .content:hover hr.divider {
      width: 100px;
    }

    /* ── Shimmer text accent ── */
    .shimmer {
      background: linear-gradient(
        to right,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.9) 50%,
        rgba(255,255,255,0.5) 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    @media (max-width: 640px) {
      .content { padding: 1.5rem; }
      .logo { max-width: 160px; margin-bottom: 1.8rem; }
      .contact { flex-direction: column; align-items: center; gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <img src="Assets/girl-mascot.png" alt="" class="mascot">
  <section class="hero" id="hero">
    <div class="content">
      <img src="Assets/Logo.png" alt="Auralabs Research" class="logo anim-fade-up">

      <h1 class="anim-fade-up anim-fade-up-d1">Coming Soon</h1>
      <p class="sub anim-fade-up anim-fade-up-d2 shimmer">Peptide Research</p>

      <hr class="divider anim-fade-up anim-fade-up-d2">

      <div class="contact anim-fade-up anim-fade-up-d3">
        <a href="mailto:auralabresearch@gmail.com">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          auralabresearch@gmail.com
        </a>
        <a href="tel:+12139488777">
          <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.57.57a1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.02l-2.2 2.2z"/></svg>
          213 948 8777
        </a>
      </div>

      <div class="barcode-wrap anim-scale-in">
        <img src="Assets/Barcode Tiktok.jpeg" alt="TikTok QR Code" class="barcode">
        <p class="barcode-label">Follow us on TikTok</p>
      </div>
    </div>
  </section>

  <script>
    (function placeHelices() {
      const hero = document.getElementById('hero');
      if (!hero) return;

      const specs = [
        { src: 'Assets/helix.png',  side: 'left',  top: 15, edge: 5,  size: 55, dur: 5.5, delay: 0 },
        { src: 'Assets/3helix.png', side: 'right', top: 65, edge: 6,  size: 70, dur: 6.5, delay: 1.2 },
      ];

      specs.forEach(s => {
        const img = document.createElement('img');
        img.src = s.src;
        img.className = 'helix-float';
        img.alt = '';
        img.style.width = s.size + 'px';
        img.style.height = 'auto';
        img.style.top = s.top + '%';
        img.style[s.side] = s.edge + '%';
        img.style.setProperty('--dur', s.dur + 's');
        img.style.setProperty('--delay', s.delay + 's');
        hero.appendChild(img);
      });
    })();
  </script>
</body>
</html>
