<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auralabs Research — Coming Soon</title>
  <link rel="icon" type="image/png" href="Assets/Favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Nevan RUS';
      src: url('Assets/Nevan RUS.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      color: #fff;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background: url('Assets/Background.jpeg') no-repeat center center / cover;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 780px;
      width: 100%;
    }

    .logo {
      max-width: 220px;
      width: 100%;
      height: auto;
      margin-bottom: 2.5rem;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
    }

    h1 {
      font-family: 'Nevan RUS', serif;
      font-size: clamp(2.8rem, 10vw, 5.5rem);
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
      text-transform: uppercase;
      text-shadow: 0 2px 30px rgba(0,0,0,0.35);
    }

    .sub {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 3rem;
      opacity: 0.85;
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem 2.5rem;
      margin-bottom: 3rem;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-weight: 400;
    }

    .contact a {
      color: #fff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: opacity 0.25s;
    }

    .contact a:hover {
      opacity: 0.7;
    }

    .contact svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .barcode {
      max-width: 160px;
      width: 100%;
      height: auto;
      opacity: 0.9;
      transition: opacity 0.3s;
    }

    .barcode:hover {
      opacity: 1;
    }

    .barcode-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.4rem;
      opacity: 0.6;
    }

    hr.divider {
      width: 60px;
      height: 2px;
      background: rgba(255,255,255,0.4);
      border: none;
      margin: 0 auto 2.5rem;
    }

    @media (max-width: 480px) {
      .content { padding: 1.5rem; }
      .logo { max-width: 160px; margin-bottom: 1.8rem; }
      .contact { flex-direction: column; align-items: center; gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="content">
      <img src="Assets/Logo.png" alt="Auralabs Research" class="logo">

      <h1>Coming Soon</h1>
      <p class="sub">Peptide Research</p>

      <hr class="divider">

      <div class="contact">
        <a href="mailto:auralabresearch@gmail.com">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          auralabresearch@gmail.com
        </a>
        <a href="tel:+12139488777">
          <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.57.57a1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.02l-2.2 2.2z"/></svg>
          213 948 8777
        </a>
      </div>

      <img src="Assets/Barcode Tiktok.jpeg" alt="TikTok QR Code" class="barcode">
      <p class="barcode-label">Follow us on TikTok</p>
    </div>
  </section>
</body>
</html>
